[appearance]

[appearance.themes]
theme = { custom = { name = "Darkrader-dark", path = "/Users/Artyom_1/.warp/themes/darkrader-dark.yaml" } }

[appearance.icon]
app_icon = "default"

[appearance.window]
override_opacity = 100
override_blur = 1
open_windows_at_custom_size = false

[appearance.text]
match_ai_font = true
match_notebook_to_monospace_font_size = true
ai_font_name = "Hack Nerd Font"
font_size = 16.0
font_name = "Hack Nerd Font"
notebook_font_size = 14.0

[appearance.vertical_tabs]
enabled = true

[appearance.input]
input_mode = "waterfall"

[account]
is_settings_sync_enabled = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "dismissed"
play_notification_sound = true

[agents]
cloud_conversation_storage_enabled = true

[agents.warp_agent]

[agents.warp_agent.input]
nld_in_terminal_enabled = true

[terminal]
show_terminal_zero_state_block = false

[terminal.input]
input_box_type_setting = "classic"
honor_ps1 = true

[privacy]
crash_reporting_enabled = true
telemetry_enabled = true

[warpify]

[warpify.ssh]
ssh_extension_install_mode = "never_install"
